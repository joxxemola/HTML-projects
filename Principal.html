<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lenguaje de señas</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:'Segoe UI',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
}

#main-layout{
margin:20px;
width:95%;
max-width:1000px;
}

canvas{
width:100%;
aspect-ratio:4/3;
border:3px solid #333;
border-radius:12px;
transform:scaleX(-1);
background:#000;
}

video{
position:absolute;
opacity:0;
}

.letra-actual{
font-size:2.5em;
font-weight:bold;
color:#00FF00;
text-align:center;
margin-top:10px;
height:60px;
}

#text-output{
width:95%;
max-width:1000px;
background:#1a1a1a;
padding:20px;
border-radius:15px;
border-bottom:5px solid #00FF00;
margin-bottom:30px;
}

.linea{
margin-bottom:15px;
}

.titulo{
font-size:1em;
color:#aaa;
}

.texto{
font-size:2em;
color:#00FF00;
min-height:1.2em;
letter-spacing:5px;
background:#000;
padding:15px;
border-radius:8px;
font-family:monospace;

word-wrap: break-word;
overflow-wrap: break-word;
white-space: normal;

max-height:120px;
overflow-y:auto;
}

#gestos{
color:#00d0ff;
letter-spacing:2px;
}

#progress-container{
width:100%;
height:10px;
background:#333;
border-radius:5px;
margin-top:10px;
overflow:hidden;
}

#progress-bar{
width:0%;
height:100%;
background:#00FF00;
}

.controles{
margin-top:15px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-borrar{background:#ff4444;color:white;}
.btn-espacio{background:#444;color:white;}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="main-layout">
<canvas id="canvas"></canvas>
<div class="letra-actual" id="infoManos">--</div>
</div>

<div id="text-output">

<div class="linea">
<div class="titulo">LETRAS</div>
<div class="texto" id="letras"></div>
</div>

<div class="linea">
<div class="titulo">GESTOS</div>
<div class="texto" id="gestos"></div>
</div>

<div id="progress-container"><div id="progress-bar"></div></div>

<div class="controles">
<button class="btn-espacio" id="btnEspacio">Espacio</button>
<button class="btn-borrar" id="btnBorrar">Borrar Todo</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const video=document.getElementById("video");

const letrasElement=document.getElementById("letras");
const gestosElement=document.getElementById("gestos");

const progressBar=document.getElementById("progress-bar");

function ajustarCanvas(){
const rect=canvas.getBoundingClientRect();
canvas.width=rect.width;
canvas.height=rect.height;
}
window.addEventListener("resize",ajustarCanvas);
ajustarCanvas();

function dist(p1,p2){
return Math.hypot(p1.x-p2.x,p1.y-p2.y);
}

function detectarDedos(lm,hand){

const esDerecha=hand==="RIGHT";

return{
pulgar:esDerecha?lm[4].x>lm[3].x:lm[4].x<lm[3].x,
indice:lm[8].y<lm[6].y,
medio:lm[12].y<lm[10].y,
anular:lm[16].y<lm[14].y,
menique:lm[20].y<lm[18].y
};

}

function obtenerLetra(d,lm){

const total=Object.values(d).filter(v=>v).length;

const d_pulgar_indice=dist(lm[4],lm[8]);
const d_indice_medio=dist(lm[8],lm[12]);

if(d.pulgar && total===1)return"A";
if(!d.pulgar && total===4 && d_indice_medio<0.04)return"B";
if(d.pulgar && d.indice && total===2)return"L";
if(d.menique && total===1)return"I";

if(d.indice && d.medio && total===2)
return d_indice_medio>0.06?"V":"U";

if(d_pulgar_indice<0.04 && d.medio && d.anular && d.menique)return"F";

if(d.pulgar && d.menique && total===2)return"Y";

if(d.indice && d.medio && d.anular && total===3)return"W";

return"";

}

function detectarGesto(d){

const total=Object.values(d).filter(v=>v).length;

if(d.pulgar && total===1)return" = BIEN =";
if(d.indice && d.medio && total===2)return"= PAZ =";
if(d.indice && total===1)return"= CUANDO =";
if(d.indice && d.menique && total===2)return"= AMOR =";

return"";

}

let ultimaLetra="";
let letraEnProgreso="";
let tiempoInicio=0;

let ultimoGesto="";
let gestoEnProgreso="";
let tiempoInicioGesto=0;

const TIEMPO=1000;

const hands=new Hands({
locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.85,
minTrackingConfidence:0.85
});

hands.onResults(results=>{

ctx.clearRect(0,0,canvas.width,canvas.height);

if(results.multiHandLandmarks){

ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

let letraDetectada="";
let gestoDetectado="";

results.multiHandLandmarks.forEach((lm,index)=>{

const label=results.multiHandedness[index].label;

const hand=label==="Left"?"RIGHT":"LEFT";

const d=detectarDedos(lm,hand);

if(hand==="RIGHT"){
const l=obtenerLetra(d,lm);
if(l)letraDetectada=l;
}

if(hand==="LEFT"){
gestoDetectado=detectarGesto(d);
}

drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:'#00FF00',lineWidth:4});
drawLandmarks(ctx,lm,{color:'#FF0000',radius:2});

});

if(gestoDetectado){

if(gestoDetectado===gestoEnProgreso){

let p=((Date.now()-tiempoInicioGesto)/TIEMPO)*100;

progressBar.style.width=Math.min(p,100)+"%";

if(p>=100 && gestoDetectado!==ultimoGesto){

gestosElement.innerText+=gestoDetectado+" ";

ultimoGesto=gestoDetectado;

}

}else{

gestoEnProgreso=gestoDetectado;
tiempoInicioGesto=Date.now();

}

}else{

gestoEnProgreso="";
}

document.getElementById("infoManos").innerText=letraDetectada||"--";

if(letraDetectada && letraDetectada!==ultimaLetra){

if(letraDetectada===letraEnProgreso){

let p=((Date.now()-tiempoInicio)/TIEMPO)*100;

progressBar.style.width=Math.min(p,100)+"%";

if(p>=100){

letrasElement.innerText+=letraDetectada;

ultimaLetra=letraDetectada;

}

}else{

letraEnProgreso=letraDetectada;
tiempoInicio=Date.now();

}

}else if(!letraDetectada){

letraEnProgreso="";
ultimaLetra="";
progressBar.style.width="0%";

}

}

});

async function iniciarCamara(){

const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

new Camera(video,{
onFrame:async()=>{await hands.send({image:video});},
width:640,
height:480
}).start();

}

document.getElementById("btnBorrar").onclick=()=>{
letrasElement.innerText="";
gestosElement.innerText="";
};

document.getElementById("btnEspacio").onclick=()=>{
letrasElement.innerText+=" ";
};

iniciarCamara();

</script>

</body>
</html>
